services:
  bot-postgres:
    image: postgres:16-alpine
    container_name: bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot_password}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - bot-postgres-data:/var/lib/postgresql/data
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-polymarket_bot}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  bot-postgres-data:
    name: bot-postgres-data

networks:
  bot-network:
    name: bot-network
